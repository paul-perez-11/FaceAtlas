<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceAtlas - Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav id="navbar" class="navbar navbar-expand-lg fixed-top px-4 py-3">
        <div class="container-fluid">
            <a href="../index.html" class="navbar-brand logo mb-0">FaceAtlas</a>
            <div class="d-none d-lg-flex nav-links mx-auto">
                <a href="../index.html">Home</a>
                <a href="shop.html" class="active">Shop</a>
                <a href="about.html">About Us</a>
            </div>
            <div class="user-icon ms-auto">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
        </div>
    </nav>

    <main class="shop-page pt-5 mt-5">
        <div class="container-fluid px-lg-5">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
                <h1 class="display-6 fw-bold text-uppercase m-0">Shop Skincare</h1>
                <div class="header-actions d-flex align-items-center gap-3">
                    <div class="search-bar position-relative" style="max-width: 320px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="position-absolute" style="left: 1rem; top: 50%; transform: translateY(-50%); color: var(--fa-text-secondary);"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.35-4.35"></path></svg>
                        <input type="text" id="shopSearch" class="form-control rounded-pill ps-5 py-2 border" placeholder="Search products, brands...">
                    </div>
                    <button class="cart-icon-btn position-relative bg-white border rounded-circle d-flex align-items-center justify-content-center p-2" id="cartIconBtn" onclick="openCart()" style="width: 44px; height: 44px;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6h15l-1.5 9h-12z" /><circle cx="9" cy="20" r="1.5" /><circle cx="18" cy="20" r="1.5" /><path d="M6 6L5 3H2" /></svg>
                        <span class="cart-badge position-absolute bg-danger text-white rounded-circle d-flex align-items-center justify-content-center" id="cartBadge" style="top:-4px; right:-4px; width:20px; height:20px; font-size:11px;">0</span>
                    </button>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-lg-3 col-xl-2">
                    <aside class="sidebar bg-white rounded-4 p-4 shadow-sm position-sticky" style="top: 90px;">
                        <div class="filter-group mb-4">
                            <h3 class="fs-6 font-mono text-uppercase pb-2 border-bottom mb-3">Types of Skincare</h3>
                            <div class="d-flex flex-column gap-2">
                                <label class="filter-option d-flex align-items-center"><input type="checkbox" class="filter-category me-2" value="Cleanser"><span class="flex-grow-1 small">Cleanser</span><span class="filter-count small text-secondary">(0)</span></label>
                                <label class="filter-option d-flex align-items-center"><input type="checkbox" class="filter-category me-2" value="Toner"><span class="flex-grow-1 small">Toner</span><span class="filter-count small text-secondary">(0)</span></label>
                                <label class="filter-option d-flex align-items-center"><input type="checkbox" class="filter-category me-2" value="Serum"><span class="flex-grow-1 small">Serum</span><span class="filter-count small text-secondary">(0)</span></label>
                                <label class="filter-option d-flex align-items-center"><input type="checkbox" class="filter-category me-2" value="Moisturizer"><span class="flex-grow-1 small">Moisturizer</span><span class="filter-count small text-secondary">(0)</span></label>
                                <label class="filter-option d-flex align-items-center"><input type="checkbox" class="filter-category me-2" value="Sunscreen"><span class="flex-grow-1 small">Sunscreen</span><span class="filter-count small text-secondary">(0)</span></label>
                                <label class="filter-option d-flex align-items-center"><input type="checkbox" class="filter-category me-2" value="Mask"><span class="flex-grow-1 small">Mask</span><span class="filter-count small text-secondary">(0)</span></label>
                            </div>
                        </div>
                        <div class="filter-group">
                            <h3 class="fs-6 font-mono text-uppercase pb-2 border-bottom mb-3">Brand</h3>
                            <div class="d-flex flex-column gap-2">
                                <label class="filter-option d-flex align-items-center"><input type="checkbox" class="filter-brand me-2" value="Pure Skin"><span class="flex-grow-1 small">Pure Skin</span><span class="filter-count small text-secondary">(0)</span></label>
                                <label class="filter-option d-flex align-items-center"><input type="checkbox" class="filter-brand me-2" value="Derm Care"><span class="flex-grow-1 small">Derm Care</span><span class="filter-count small text-secondary">(0)</span></label>
                                <label class="filter-option d-flex align-items-center"><input type="checkbox" class="filter-brand me-2" value="Glow Labs"><span class="flex-grow-1 small">Glow Labs</span><span class="filter-count small text-secondary">(0)</span></label>
                            </div>
                        </div>
                    </aside>
                </div>
                <div class="col-lg-9 col-xl-10">
                    <div class="row g-4" id="shopProductsGrid"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="productModalOverlay"><div class="product-modal container bg-white rounded-4" id="productModalContent"></div></div>

    <div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
    <div class="cart-panel bg-white shadow d-flex flex-column" id="cartPanel" style="position:fixed; top:0; right:0; width:400px; max-width:100%; height:100vh; z-index:2501; transform:translateX(100%); transition:transform 0.3s ease;">
        <div class="cart-header p-4 border-bottom d-flex justify-content-between align-items-center">
            <h3 class="m-0 fs-5 text-uppercase">Your Cart</h3>
            <button class="btn btn-light rounded-circle p-2" onclick="closeCart()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" /></svg></button>
        </div>
        <div class="cart-content flex-grow-1 overflow-auto p-4" id="cartContent"></div>
        <div class="cart-footer p-4 border-top bg-light" id="cartFooter"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
